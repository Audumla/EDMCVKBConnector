name: Release Please

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: "Optional exact release version (e.g. 1.2.3) to force for this run"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Stamp changelog in PR
        run: |
          python scripts/changelog/generate_release_notes.py \
            --stamp ${{ steps.version.outputs.version }} \
            --archive

      - name: Rebuild changelog markdown
        run: python scripts/changelog/build_changelog.py

      - name: Sync release-please changelog from project summaries
        run: python scripts/changelog/build_changelog.py --output CHANGELOG.release-please.md

      - name: Commit stamped changes to PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md CHANGELOG.release-please.md docs/changelog/CHANGELOG.json docs/changelog/CHANGELOG.archive.json docs/changelog/CHANGELOG.summaries.json
          git diff --cached --quiet || git commit -m "chore: stamp changelog for v${{ steps.version.outputs.version }} [skip ci]"
          git push

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}

      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate release notes
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          python scripts/changelog/generate_release_notes.py \
            --version ${{ steps.release.outputs.version }} \
            --output dist/RELEASE_NOTES.md

      - name: Build plugin zip
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: python scripts/release/package_plugin.py

      - name: Upload release asset
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          files: dist/EDMCVKBConnector-${{ steps.release.outputs.version }}.zip
          body_path: dist/RELEASE_NOTES.md
          fail_on_unmatched_files: true
          prerelease: ${{ contains(steps.release.outputs.version, '-alpha') || contains(steps.release.outputs.version, '-beta') || contains(steps.release.outputs.version, '-rc') }}
